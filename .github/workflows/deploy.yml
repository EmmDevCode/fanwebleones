name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 177.7.46.103
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/fanwebleones

            git fetch origin
            git reset --hard origin/main

            docker compose build --no-cache
            docker compose up -d