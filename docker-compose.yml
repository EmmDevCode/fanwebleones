services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    environment:
      - TZ=America/Merida

  backend:
    build: ./backend
    container_name: python_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - app_network
    environment:
      - TZ=America/Merida

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      # - "443:443" # Descomenta esta línea más adelante si agregas el certificado SSL de Cloudflare
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
